# Render IaC — Bard Santner v2 (the "red pill" build).
# Static site deploy: React + Vite build in /frontend, output /frontend/dist.
# Connected to github.com/Mutombe/bard-platform-v2 main.
services:
  - type: web
    runtime: static
    name: bard-platform-v2
    repo: https://github.com/Mutombe/bard-platform-v2
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
