<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#312f4d" />
    <meta name="author" content="Bard Santner Markets Inc" />

    <!-- Per-route SEO is injected by <SEO /> (react-helmet-async). The title
         below is the fallback shown to the SPA shell before React hydrates.
         Prerendered routes ship full route-specific head out of the box. -->
    <title>Bard Santner Markets Inc</title>
    <meta name="description" content="Bard Santner Markets Inc — a modern African financial platform. Banking, wealth management, trade finance, treasury and advisory." />

    <!-- Fonts are self-hosted via @fontsource imports in main.jsx.
         No third-party CDN, no leak of client IP to fonts.googleapis.com. -->

    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
